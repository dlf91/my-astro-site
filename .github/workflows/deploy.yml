name: Compile and Deploy Astro to Hostinger

on:
  push:
    branches:
      - main  # Change this to 'master' if your default branch is master

jobs:
  build-and-deploy:
    name: 🚀 Compile & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Fetch Repository Code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'  # Fits standard Astro development specs
        cache: 'npm'

    - name: 📦 Install Project Dependencies
      run: npm ci

    - name: 🏗️ Compile Production Build
      run: npm run build

    - name: 🔍 Debug Directory Output (Check if dist exists)
      run: ls -la

    - name: 📂 Sync Compiled Dist to Hostinger Workspace
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: 88.223.84.30
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/ 
        server-dir: /                 # <─── Target the absolute login root
        dangerous-clean-slate: false